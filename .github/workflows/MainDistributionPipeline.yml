#
# This workflow calls the main distribution pipeline from DuckDB to build, test and (optionally) release the extension
#
name: Main Extension Distribution Pipeline
on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' && github.sha || '' }}
  cancel-in-progress: true

jobs:
  duckdb-stable-build:
    name: Build extension binaries
    # Pinned past the v1.5.1 branch (frozen 2026-03-26) to commit b0a37851e, which fixes the
    # Windows build on the updated windows-latest image: the v1.5.1 workflow hardcoded
    # vcvars from "Visual Studio\2022", but the runner now ships VS 18 (2026), so MSVC was never
    # activated and CMake/Ninja fell back to MinGW g++ — which then failed to link the MSVC-built
    # leveldb. This commit probes VS 18 first (falling back to 2022) and forces cl as the compiler.
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@b0a37851ee310dfbe38ffc1fdbfd5f80824162bf
    with:
      duckdb_version: v1.5.1
      ci_tools_version: b0a37851ee310dfbe38ffc1fdbfd5f80824162bf
      extension_name: level_pivot

  format-check:
    name: Format Check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'true'

      - name: Install dependencies
        run: |
          sudo apt-get update -y -qq
          sudo apt-get install -y -qq ninja-build clang-format-11
          pip install cmake-format 'black==24.*' cxxheaderparser pcpp 'clang_format==11.0.1'

      - name: Run format check
        run: make format-check
        env:
          GEN: ninja

  tidy-check:
    name: Tidy Check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'true'

      - name: Run tidy
        run: make tidy-check VCPKG_TOOLCHAIN_PATH="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
        env:
          GEN: ninja
